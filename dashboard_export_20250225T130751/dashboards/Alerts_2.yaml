css:
  "/* Filter bar background */\ndiv[data-test=filter-bar] > div {\n  background:\
  \ #fff3e0;\n}\n\n/* Filter buttons */\n.filter-card .ant-select-selector,\n.filter-card\
  \ .ant-picker,\n.filter-card .ant-input-number,\n.filter-card .ant-input {\n  border-color:\
  \ #ff9800 !important;\n}\n\n/* Active filter states */\n.filter-card .ant-select-focused\
  \ .ant-select-selector,\n.filter-card .ant-picker-focused,\n.filter-card .ant-input-number-focused,\n\
  .filter-card .ant-input-focused {\n  border-color: #f57c00 !important;\n  box-shadow:\
  \ 0 0 0 2px rgba(255, 152, 0, 0.2) !important;\n}\n\n/* Filter dropdowns */\n.ant-select-dropdown\
  \ {\n  border: 1px solid #ff9800;\n}\n\n/* Selected filter options */\n.ant-select-item-option-selected:not(.ant-select-item-option-disabled)\
  \ {\n  background-color: #fff3e0 !important;\n  color: #f57c00 !important;\n}\n\n\
  /* Filter icons */\n.filter-card .anticon {\n  color: #ff9800;\n}\n\n/* Apply button\
  \ */\n.ant-btn.superset-button.superset-button-primary.cta {\n  background: #ff9800\
  \ !important;\n  border-color: #f57c00 !important;\n}\n\n.ant-btn.superset-button.superset-button-primary.cta:hover\
  \ {\n  background: #f57c00 !important;\n  border-color: #ef6c00 !important;\n}\n\
  \n/* Secondary buttons */\n.ant-btn.superset-button.superset-button-secondary.cta\
  \ {\n  color: #ff9800 !important;\n  border-color: #ff9800 !important;\n  background:\
  \ transparent !important;\n}\n\n.ant-btn.superset-button.superset-button-secondary.cta:hover\
  \ {\n  color: #f57c00 !important;\n  border-color: #f57c00 !important;\n  background:\
  \ #fff3e0 !important;\n}\n\n/* Radio buttons */\n.ant-radio-wrapper .ant-radio-checked\
  \ .ant-radio-inner {\n  border-color: #ff9800 !important;\n  background-color: #ff9800\
  \ !important;\n}\n\n.ant-radio-wrapper .ant-radio:hover .ant-radio-inner {\n  border-color:\
  \ #ff9800 !important;\n}\n\n.ant-radio-wrapper .ant-radio-input:focus + .ant-radio-inner\
  \ {\n  box-shadow: 0 0 0 2px rgba(255, 152, 0, 0.2) !important;\n}\n\n/* Filter\
  \ badges */\n.filter-indicator {\n  background-color: #ff9800 !important;\n  color:\
  \ white !important;\n}\n\n/* Filter card borders */\n.filter-card {\n  border: 1px\
  \ solid #ffe0b2;\n  border-radius: 4px;\n}"
