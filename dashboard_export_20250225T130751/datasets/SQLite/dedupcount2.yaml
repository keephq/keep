sql:
  "SELECT count(*) as c\nFROM (\n  SELECT \n    datetime(timestamp) as __time,\n\
  \    *\n  FROM alertdeduplicationevent \n  WHERE 1=1\n    {% if filter_values('service')|length\
  \ %}\n      AND json_extract(event, '$.service') in {{filter_values('service')|where_in}}\n\
  \    {% endif %}\n    {% if filter_values('environment')|length %}\n      AND json_extract(event,\
  \ '$.environment') in {{filter_values('environment')|where_in}}\n    {% endif %}\n\
  \    {% if filter_values('status')|length %}\n      AND json_extract(event, '$.status')\
  \ in {{filter_values('status')|where_in}}\n    {% endif %}\n    {% if filter_values('severity')|length\
  \ %}\n      AND json_extract(event, '$.severity') in {{filter_values('severity')|where_in}}\n\
  \    {% endif %}\n    {% if filter_values('__time_range')|length %}\n      AND datetime(timestamp)\
  \ >= '{{ filter_values('__time_range')[0] }}'\n      AND datetime(timestamp) < '{{\
  \ filter_values('__time_range')[1] }}'\n    {% endif %}\n) AS filtered_alerts"
