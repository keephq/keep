sql:
  "WITH execution_stats AS (\n  SELECT \n    w.name as workflow_name,\n    COUNT(CASE\
  \ WHEN we.status = 'COMPLETED' THEN 1 END) as successful_executions,\n    COUNT(*)\
  \ as total_executions,\n    ROUND(COUNT(CASE WHEN we.status = 'COMPLETED' THEN 1\
  \ END) * 100.0 / NULLIF(COUNT(*), 0), 2) as success_rate,\n    we.started as execution_time\n\
  \  FROM workflow w\n  LEFT JOIN workflowexecution we ON w.id = we.workflow_id \n\
  \  WHERE w.is_deleted = FALSE \n    AND w.is_disabled = FALSE\n  GROUP BY w.name,\
  \ we.started\n)\nSELECT \n  workflow_name,\n  successful_executions,\n  total_executions,\n\
  \  success_rate,\n  execution_time\nFROM execution_stats"
