sql:
  "WITH alert_metrics AS (\n  SELECT \n    strftime('%Y-%m-%d %H:%M', timestamp)\
  \ as minute,\n    json_extract(event, '$.service') as service,\n    json_extract(event,\
  \ '$.environment') as environment,\n    json_extract(event, '$.status') as status,\n\
  \    json_extract(event, '$.severity') as severity,\n    COUNT(*) as event_count\n\
  \  FROM alert\n  GROUP BY \n    strftime('%Y-%m-%d %H:%M', timestamp),\n    json_extract(event,\
  \ '$.service'),\n    json_extract(event, '$.environment'),\n    json_extract(event,\
  \ '$.status'),\n    json_extract(event, '$.severity')\n  ORDER BY minute\n)\nSELECT\
  \ \n  minute,\n  service,\n  environment,\n  status,\n  severity,\n  event_count\n\
  FROM alert_metrics;"
