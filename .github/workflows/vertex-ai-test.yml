name: "Vertex AI Provider Tests"

on:
  push:
    branches: ["feat/vertex-ai-provider"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint Vertex AI Provider
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters
        run: pip install black isort

      - name: Check black formatting
        run: black --check keep/providers/vertexai_provider/ tests/test_vertexai_provider.py

      - name: Check import sorting
        run: isort --check-only keep/providers/vertexai_provider/ tests/test_vertexai_provider.py

  test:
    name: Test Vertex AI Provider
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install poetry
          poetry install --with dev

      - name: Run Vertex AI provider tests
        run: poetry run pytest tests/test_vertexai_provider.py -v

      - name: Run provider import test
        run: |
          poetry run python -c "
          from keep.providers.vertexai_provider.vertexai_provider import VertexaiProvider
          print(f'Provider loaded: {VertexaiProvider.PROVIDER_DISPLAY_NAME}')
          print(f'Categories: {VertexaiProvider.PROVIDER_CATEGORY}')
          print(f'Scopes: {len(VertexaiProvider.PROVIDER_SCOPES)}')
          print('OK')
          "
